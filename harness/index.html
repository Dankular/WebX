<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WebX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c10; color: #c8d8e8; font-family: monospace; height: 100dvh; display: flex; flex-direction: column; }

    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: #0d1620; border-bottom: 1px solid #1e3048;
      flex-shrink: 0;
    }
    #toolbar h1 { font-size: 14px; font-weight: 600; letter-spacing: 2px; color: #4da6ff; }
    #status { font-size: 12px; color: #5a8ab0; margin-left: auto; }
    #launch-btn {
      padding: 6px 16px; background: #1a4a8a; border: 1px solid #4da6ff;
      color: #c8d8e8; font-family: monospace; font-size: 13px;
      cursor: pointer; border-radius: 3px;
    }
    #launch-btn:hover { background: #2a5a9a; }
    #launch-btn:disabled { opacity: 0.4; cursor: default; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #canvas-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #000;
    }
    canvas {
      max-width: 100%; max-height: 100%;
      image-rendering: pixelated;
    }

    #console-wrap {
      width: 320px; background: #0a1018; border-left: 1px solid #1e3048;
      display: flex; flex-direction: column; font-size: 11px;
      flex-shrink: 0;
    }
    #console-wrap h2 { padding: 6px 10px; font-size: 11px; color: #5a8ab0; border-bottom: 1px solid #1e3048; }
    #console {
      flex: 1; overflow-y: auto; padding: 8px 10px;
      white-space: pre-wrap; word-break: break-all; color: #7ab0d0;
      line-height: 1.5;
    }

    #error-banner {
      display: none; padding: 10px 16px;
      background: #3a0010; border-top: 1px solid #8a0030;
      color: #ff6080; font-size: 12px;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>W E B X</h1>
  <span id="status">Ready</span>
  <button id="launch-btn">Launch</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="game" width="1280" height="720"></canvas>
  </div>
  <div id="console-wrap">
    <h2>Boot console</h2>
    <pre id="console"></pre>
  </div>
</div>

<div id="error-banner" id="err"></div>

<script type="module">
  import { boot } from './canary-host.mjs';

  const canvas     = document.getElementById('game');
  const consoleEl  = document.getElementById('console');
  const statusEl   = document.getElementById('status');
  const launchBtn  = document.getElementById('launch-btn');
  const errorBanner = document.getElementById('error-banner');

  /* ── WebGPU check ── */
  if (!navigator.gpu) {
    errorBanner.style.display = 'block';
    errorBanner.textContent = 'WebGPU not available. Use Chrome 113+, Edge 113+, or Firefox Nightly with dom.webgpu.enabled=true.';
    launchBtn.disabled = true;
  }

  /* ── SharedArrayBuffer check (COOP/COEP) ── */
  if (!crossOriginIsolated) {
    errorBanner.style.display = 'block';
    errorBanner.textContent = 'Cross-origin isolation not active. The server must send COOP/COEP headers. Run: npm run dev';
    launchBtn.disabled = true;
  }

  launchBtn.addEventListener('click', async () => {
    launchBtn.disabled = true;
    statusEl.textContent = 'Booting…';

    try {
      await boot(canvas, consoleEl);
      statusEl.textContent = 'Running';
    } catch (err) {
      statusEl.textContent = 'Error';
      errorBanner.style.display = 'block';
      errorBanner.textContent = err.message;
      console.error(err);
      launchBtn.disabled = false;
    }
  });
</script>
</body>
</html>
